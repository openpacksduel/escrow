name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - name: Check formatting
        run: cargo +stable fmt --all -- --check
      - name: Lint
        run: cargo +stable clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo +stable test --workspace

  typescript-client:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: clients/typescript
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify checked release metadata
        run: cd idl && sha256sum --check SHA256SUMS
      - name: Check formatting and lint
        run: bun run lint
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Build package
        run: bun run build
